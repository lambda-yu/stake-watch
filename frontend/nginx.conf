server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so nginx doesn't die when `backend` is
    # missing at config-load time (compose race) or restarts later. The
    # variable in proxy_pass forces nginx to defer name resolution to
    # request time instead of caching the IP forever.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
