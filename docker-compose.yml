services:
  backend:
    build: .
    container_name: stake-watch-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - db-data:/data
      - ./config:/app/config:ro
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=sqlite:///data/stake_watch.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: stake-watch-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
